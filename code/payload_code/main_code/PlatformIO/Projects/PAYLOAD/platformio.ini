; PlatformIO Project Configuration File
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ── Shared settings ────────────────────────────────────────────────────────────
[base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default.csv
board_upload.flash_size = 16MB
board_build.psram_type = qspi
upload_speed = 115200
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1 -I mavlink/mavlink/library
monitor_speed = 115200
monitor_echo = yes
monitor_eol = LF
monitor_filters = send_on_enter
monitor_rts = 0
monitor_dtr = 0

; ── Production build ───────────────────────────────────────────────────────────
[env:new]
extends = base
build_src_filter = +<New/*>
lib_deps =
	https://github.com/tdk-invn-oss/motion.arduino.ICM45686.git#1.1.1
	adafruit/Adafruit BMP3XX Library@^2.1.6
	jgromes/RadioLib@^7.6.0
	https://github.com/DFRobot/DFRobot_BMM350.git

[env:main]
extends = base
build_src_filter = +<*> -<tests/*>
lib_deps =
	https://github.com/tdk-invn-oss/motion.arduino.ICM45686.git#1.1.1
	adafruit/Adafruit BMP3XX Library@^2.1.6
	jgromes/RadioLib@^7.6.0
	https://github.com/DFRobot/DFRobot_BMM350.git
	https://github.com/USN-Horizon/mavlink

; ── Component tests ────────────────────────────────────────────────────────────
; Upload & open serial monitor to run a test:
;   pio run -e test_geiger -t upload && pio device monitor -e test_geiger

[env:test_geiger]
extends = base
build_src_filter = -<*> +<tests/test_geiger.cpp>

[env:test_lora]
extends = base
build_src_filter = -<*> +<tests/test_lora.cpp>
lib_deps = jgromes/RadioLib@^7.6.0

[env:test_imu]
extends = base
build_src_filter = -<*> +<tests/test_imu.cpp>
lib_deps = https://github.com/tdk-invn-oss/motion.arduino.ICM45686.git#1.1.1

[env:test_baro]
extends = base
build_src_filter = -<*> +<tests/test_baro.cpp>
lib_deps = adafruit/Adafruit BMP3XX Library@^2.1.6

[env:test_mag]
extends = base
build_src_filter = -<*> +<tests/test_mag.cpp>
lib_deps = https://github.com/DFRobot/DFRobot_BMM350.git

[env:test_sdcard]
extends = base
build_src_filter = -<*> +<tests/test_sdcard.cpp>

[env:test_flash]
extends = base
build_src_filter = -<*> +<tests/test_flash.cpp>

[env:test_lora_temp]
extends = base
build_src_filter = -<*> +<tests/test_lora_temp.cpp>

[env:test_lora_volt]
extends = base
build_src_filter = -<*> +<tests/test_lora_volt.cpp>
